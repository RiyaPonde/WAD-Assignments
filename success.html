<!DOCTYPE html>
<html>
<head>
  <title>Success</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      color: green;
    }

    p {
      color: #555;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>🎉 Registration Successful!</h2>
    <p>Welcome to our system</p>

    <div id="userInfo"></div>
  </div>

  <script>
    let users = JSON.parse(localStorage.getItem("users"));
    let lastUser = users[users.length - 1];

    document.getElementById("userInfo").innerHTML = `
      <h3>User Details</h3>
      Name: ${lastUser.name} <br>
      Email: ${lastUser.email}
    `;
  </script>

</body>
</html>
